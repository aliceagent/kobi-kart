<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kobi Kart — 2-player browser kart racing</title>
    <meta
      name="description"
      content="A bright 2-player couch kart racer. Share one keyboard and race a 4-track Grand Prix against AI rivals on procedurally generated tracks, with power-ups, shells, and themed worlds."
    />
    <meta name="theme-color" content="#5fb8ee" />

    <!-- Open Graph (Facebook, iMessage, Slack, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kobi Kart" />
    <meta property="og:title" content="Kobi Kart — 2-player browser kart racing" />
    <meta
      property="og:description"
      content="Share one keyboard and race a 4-track Grand Prix against AI rivals on procedurally generated tracks, with power-ups, shells, and themed worlds. Play free in your browser!"
    />
    <meta property="og:url" content="https://kobi-kart.vercel.app/" />
    <meta property="og:image" content="https://kobi-kart.vercel.app/og.png?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kobi Kart — top-down kart racing and balloon battle" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kobi Kart — 2-player browser kart racing" />
    <meta
      name="twitter:description"
      content="Share one keyboard and race a 4-track Grand Prix against AI rivals, with power-ups and procedurally generated tracks. Play free in your browser!"
    />
    <meta name="twitter:image" content="https://kobi-kart.vercel.app/og.png?v=2" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #15151f;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        /* Smooth scaling — Kobi Kart is bright vector art, not pixel art. */
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
